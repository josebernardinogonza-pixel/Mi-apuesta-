<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetPro Real-Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .match-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; }
        .loader { border-top-color: #10b981; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <!-- Header -->
    <header class="flex justify-between items-center mb-6 bg-[#1e293b] p-4 rounded-xl border border-green-500/30">
        <div>
            <h1 class="text-green-500 font-black text-xl tracking-tighter">LIVE<span class="text-white">BET</span></h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Datos Reales API</p>
        </div>
        <div class="text-right">
            <span class="text-xs text-gray-400 block">Balance Virtual</span>
            <span class="text-xl font-bold text-green-400">$<span id="saldo">1000</span></span>
        </div>
    </header>

    <!-- Configuración API -->
    <div id="api-config" class="mb-6 p-4 bg-yellow-500/10 border border-yellow-500/50 rounded-lg">
        <p class="text-xs mb-2 text-yellow-500 font-bold italic underline">Pega tu API KEY de the-odds-api.com:</p>
        <div class="flex gap-2">
            <input type="password" id="apiKey" class="bg-black/50 border border-white/20 rounded p-2 text-xs flex-1" placeholder="Tu API KEY aquí">
            <button onclick="fetchRealOdds()" class="bg-yellow-500 text-black px-4 py-2 rounded text-xs font-bold italic underline">CONECTAR</button>
        </div>
    </div>

    <!-- Filtros -->
    <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
        <span class="bg-green-500 text-black px-3 py-1 rounded-full text-xs font-bold">Fútbol</span>
        <span class="bg-slate-700 px-3 py-1 rounded-full text-xs italic underline">La Liga</span>
        <span class="bg-slate-700 px-3 py-1 rounded-full text-xs italic underline">Premier League</span>
    </div>

    <!-- Lista de Partidos -->
    <div id="loading" class="hidden flex flex-col items-center py-10">
        <div class="loader w-10 h-10 border-4 border-slate-700 rounded-full mb-2 italic underline"></div>
        <p class="text-xs text-gray-400 italic underline">Consultando estadios...</p>
    </div>

    <div id="partidos-reales" class="space-y-4 italic underline">
        <!-- Los partidos reales aparecerán aquí -->
    </div>

    <script>
        let saldo = parseFloat(localStorage.getItem('saldo_sim')) || 1000.00;
        
        function updateSaldo() {
            document.getElementById('saldo').innerText = saldo.toFixed(2);
            localStorage.setItem('saldo_sim', saldo);
        }

        async function fetchRealOdds() {
            const key = document.getElementById('apiKey').value;
            if(!key) return alert("cd8d0051916f32591ab4732ab20e1f4d");

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('partidos-reales').innerHTML = '';

            try {
                // Consultamos partidos de Fútbol (Soccer)
                const response = await fetch(`https://api.the-odds-api.com/v4/sports/soccer_spain_la_liga/odds/?apiKey=${key}&regions=eu&markets=h2h`);
                const data = await response.json();

                if(data.error) throw new Error(data.error);

                renderPartidos(data);
            } catch (err) {
                alert("Error al conectar con la API. Revisa tu Key.");
                console.error(err);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderPartidos(partidos) {
            const container = document.getElementById('partidos-reales');
            container.innerHTML = '';

            partidos.forEach(p => {
                // Buscamos las cuotas de un corredor (ej: William Hill o Marathon Bet)
                const bookmaker = p.bookmakers[0];
                if(!bookmaker) return;
                
                const odds = bookmaker.markets[0].outcomes;
                const home = odds.find(o => o.name === p.home_team);
                const away = odds.find(o => o.name === p.away_team);
                const draw = odds.find(o => o.name === 'Draw');

                container.innerHTML += `
                    <div class="match-card p-4 rounded-2xl">
                        <div class="flex justify-between items-center mb-4 italic underline">
                            <span class="text-[10px] text-gray-500 font-bold">${new Date(p.commence_time).toLocaleString()}</span>
                            <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded text-green-400">REAL TIME</span>
                        </div>
                        <div class="grid grid-cols-3 items-center mb-6 text-center italic underline">
                            <div class="font-bold text-sm italic underline">${p.home_team}</div>
                            <div class="text-gray-600 text-xs italic underline">vs</div>
                            <div class="font-bold text-sm italic underline">${p.away_team}</div>
                        </div>
                        <div class="grid grid-cols-3 gap-3 italic underline">
                            <button onclick="apostar('${p.home_team}', ${home.price})" class="bg-slate-800 hover:bg-green-600 p-2 rounded-xl transition-all italic underline">
                                <span class="block text-[10px] text-gray-400 uppercase italic underline">Local</span>
                                <span class="font-bold text-green-400 italic underline">${home.price}</span>
                            </button>
                            <button onclick="apostar('Empate', ${draw.price})" class="bg-slate-800 hover:bg-green-600 p-2 rounded-xl transition-all italic underline">
                                <span class="block text-[10px] text-gray-400 uppercase italic underline">X</span>
                                <span class="font-bold text-green-400 italic underline">${draw.price}</span>
                            </button>
                            <button onclick="apostar('${p.away_team}', ${away.price})" class="bg-slate-800 hover:bg-green-600 p-2 rounded-xl transition-all italic underline">
                                <span class="block text-[10px] text-gray-400 uppercase italic underline">Visitante</span>
                                <span class="font-bold text-green-400 italic underline">${away.price}</span>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function apostar(equipo, cuota) {
            const monto = prompt(`¿Cuánto quieres apostar por ${equipo}? (Cuota: ${cuota})`);
            const m = parseFloat(monto);

            if(m > 0 && m <= saldo) {
                saldo -= m;
                updateSaldo();
                alert(`Apuesta realizada: $${m} a ${equipo}. \n\nEsto es una prueba, los resultados se validarán cuando el partido termine en la vida real.`);
            } else {
                alert("Saldo insuficiente o monto inválido");
            }
        }

        updateSaldo();
    </script>
</body>
</html>
